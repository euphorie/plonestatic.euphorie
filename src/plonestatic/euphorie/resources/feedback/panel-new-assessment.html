<div

        id="pat-modal-panel"
        open>

                    <fieldset
    class="vertical">

            name="organisation">

    </label>
    <fieldset
    class="
        pat-checklist">
    <legend>
        <!-- i18n: label_start_ell -->
    </legend>
    <label
        class="label">
        <strong 
            class="label-fragment-title"><!-- i18n: label_from_scratch --></strong>
        <span 
            class="label-fragment-description"> <!-- i18n: message_start_from_scratch_empty_ra --></span>
        <input 
            id="input-tabula-rasa"
            checked 
            type="radio" 
            name="tabula"
            value="rasa">
    </label>
    <label
        class="label">

            class="label-fragment-title"><!-- i18n: label_based_on_existing_ra --></strong>

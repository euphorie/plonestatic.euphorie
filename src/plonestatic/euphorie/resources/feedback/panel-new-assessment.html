<!DOCTYPE html>
<html 
  class="no-js" 
  lang="en">
  <head>
    <meta 
      charset="UTF-8"/>
    <meta

      CONTENT="">
  	<title>label_new_risk_assessment — OiRA</title>
    <meta 
      name="viewport" 
      content="width=device-width, initial-scale=1" />
    <link 
      rel="stylesheet" 
      media="screen" 
      type="text/css" 
      href="/assets/oira/style/all.css"/>

    <meta 
      content="" 
      name="description">
    <meta 
      content="" 
      name="keywords">
    
    <meta 
        content="label_new_risk_assessment — OiRA"
        property="og:title">
    
    
        <meta 
            content=""
            property="og:image">
    

    <script
        src="/assets/oira/script/bundle.min.js"
        type="text/javascript"></script>
    </head>
    <body 
        class="  layout-patterns-modal">
        

<div 
    id="pat-modal-panel-space">
    <dialog
        class="medium medium mode-select  pat-modal-panel"
        id="pat-modal-panel"
        open>
        <div
            class="modal-panel-contents">
            
                <div
                    class="modal-panel-header">
                    <h1
                        class="modal-panel-title"><!-- i18n: label_new_risk_assessment -->New risk assessment</h1>
                    
                </div>
            
            
                <form
                    
                    action="panel-new-assessment-tabula-plena"
                    data-pat-inject="source: #pat-modal-panel; target: #pat-modal-panel;"
                    class="pat-inject pat-form modal-panel-body">
                    <fieldset
    class="vertical">
    <label>
        <!-- i18n: label_create_this_assessment_for_organisation_ell -->Create this risk assessment for organisation…  
        <select
            name="organisation">
            
                <option value="organisation-of-yvette">Organisation of Yvette</option>
            
                <option value="café-de-la-cloche">Café de la Cloche</option>
            
        </select>
    </label>
    <fieldset
    class="
        pat-checklist">
    <legend>
        <!-- i18n: label_start_ell -->Start…
    </legend>
    <label
        class="label">
        <strong 
            class="label-fragment-title"><!-- i18n: label_from_scratch -->From scratch</strong>
        <span 
            class="label-fragment-description"> <!-- i18n: message_start_from_scratch_empty_ra -->Start from scratch with an empty risk assessment.</span>
        <input 
            id="input-tabula-rasa"
            checked 
            type="radio" 
            name="tabula"
            value="rasa">
    </label>
    <label
        class="label">
        <strong 
            class="label-fragment-title"><!-- i18n: label_based_on_existing_ra -->Based on an existing risk assessment</strong>
        <span class="label-fragment-description"> <!-- i18n: message_base_on_existing_ra -->Start based on an existing risk assessment. All content of the existing risk assessment will be copied over into the new risk assessment, which you can edit and augment at will.</span>
        <input 
            id="input-tabula-plena"
            type="radio" 
            name="tabula"
            value="plena">
    </label>
</fieldset>
</fieldset>
                    
    <!-- <pat-button-bar class="modal-panel-footer modal-panel-main-button-bar pat-bumper"> -->
    <div
        class="
            modal-panel-footer 
            modal-panel-main-button-bar 
            pat-button-bar 
            pat-bumper">
        
            
            
                <button
                    class="
                        pat-button 
                        close-panel float-before 
                         
                        "
                    
                    
                    type="button" >Cancel</button>
            
            
            
        
            
            
                <button
                    class="
                        pat-button 
                        default float-after 
                         
                        "
                    
                    
                    type="submit" >Next</button>
            
            
            
        
        
    </div>
    <!-- </pat-button-bar> -->

                </form>
                            
        </div>
    </dialog>
</div>
    </body>
</html>
